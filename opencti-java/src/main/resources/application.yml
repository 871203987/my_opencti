spring:
  application:
    name: opencti
  profiles:
    active: default

server:
  port: 4000

logging:
  level:
    root: INFO
    io.opencti: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always

opencti:
  app:
    port: 4000
    base-path: ""
    base-url: "http://localhost:4000/"
    title: "OpenCTI"
    description: "OpenCTI Platform"
    platform-title: "OpenCTI - Cyber Threat Intelligence Platform"
    platform-favicon: "/static/favicon.ico"
    platform-version: "6.9.5"
    admin-email: "admin@opencti.io"
    admin-password: "ChangeMe"
    admin-token: "ChangeMe"
    admin-onboarding: true
    default-language: "auto"
    default-marking: false
    default-marking-value: "TLP:CLEAR"
    enforce-references: true
    enforce-consensus: true
    app-logs:
      logs-level: "info"
      logs-files: true
      logs-console: true
      logs-max-files: 7
      logs-directory: "./logs"
      logs-redacted-inputs:
        - "password"
        - "secret"
        - "token"
        - "api_key"
        - "apikey"
    session:
      session-secret: "ChangeMe"
      session-timeout: 28800000
    cookie:
      cookie-prefix: "o.a"
      cookie-secure: true
      cookie-http-only: true

  elasticsearch:
    url: "http://localhost:9200"
    index-prefix: "opencti"
    username: "admin"
    password: "admin"
    # 引擎选择器: auto(自动检测), elk(Elasticsearch), opensearch(OpenSearch)
    # 重写自: engine.ts - engineSelector (行398)
    engine-selector: "auto"
    # 是否验证引擎类型与配置匹配
    # 重写自: engine.ts - engineCheck (行399)
    engine-check: true
    ssl-verification: false
    max-retries: 5
    request-timeout: 120000
    ping-timeout: 30000
    scroll-duration: 60000
    scroll-size: 5000
    max-concurrent-searches: 10
    max-concurrent-normalizations: 10
    bulk-max-size: 5000
    bulk-max-time: 5000
    bulk-max-retry: 5
    max-connection-retries: 5
    max-result-window: 100000
    max-runtime-resolutions: 5000
    # AWS OpenSearch 配置 (可选)
    # 重写自: engine.ts - opensearch配置 (行382-394)
    # region: "us-east-1"
    # service: "es"
    # access-key: ""
    # secret-key: ""

  redis:
    hostname: "localhost"
    port: 6379
    password: ""
    database: 0
    namespace: "opencti"
    mode: "single"
    use-ssl: false
    connection-timeout: 10000
    operation-timeout: 5000
    max-retries: 5
    pool-max-total: 50
    pool-max-idle: 10
    trimming: 50000
    stream-batch-size: 100
    stream-max-consumers: 10
    stream-max-pending-entries: 10000
    cluster-max-redirects: 5

  rabbitmq:
    hostname: "localhost"
    port: 5672
    username: "guest"
    password: "guest"
    vhost: "/"
    queue-prefix: "opencti"
    use-ssl: false
    port-management: 15672
    management-ssl: false
    connection-timeout: 30000
    heartbeat-interval: 30
    max-retries: 5
    retry-delay: 1000
    prefetch-count: 10
    consumer-concurrency: 5
    queue-max-priority: 10
    queue-type: "classic"

  minio:
    endpoint: "localhost"
    port: 9000
    use-ssl: false
    access-key: "ChangeMe"
    secret-key: "ChangeMe"
    bucket-name: "opencti"
    bucket-region: "us-east-1"
    connection-timeout: 10000
    read-timeout: 60000
    write-timeout: 60000
    max-connections: 100

  telemetry:
    enabled: false
    service-name: "opencti"

  proxy:
    http-proxy: ""
    https-proxy: ""
    no-proxy: ""
    https-proxy-reject-unauthorized: true
